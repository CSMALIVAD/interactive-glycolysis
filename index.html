<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Integrated Metabolic Network – Auditorium Mode</title>

<style>
body{
    margin:0;
    padding:40px;
    font-family: "Segoe UI", Arial;
    background:#0e1117;
    color:#e6edf3;
}

h1{
    text-align:center;
    font-weight:400;
    margin-bottom:40px;
    letter-spacing:1px;
}

.container{
    position:relative;
    width:1000px;
    margin:0 auto;
}

.node{
    position:absolute;
    text-align:center;
    font-size:15px;
    transition:opacity 0.5s ease;
    opacity:0;
}

.node.show{opacity:1;}

.title{
    font-weight:600;
    font-size:16px;
}

.enzyme{
    font-size:12px;
    color:#8b949e;
}

.carbon{color:#58a6ff;}
.green{color:#3fb950;}
.red{color:#f85149;}
.purple{color:#bc8cff;}

.energy-box{
    position:absolute;
    right:-260px;
    top:0;
    border:1px solid #30363d;
    padding:15px;
    width:200px;
}

svg{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

line{
    stroke:#8b949e;
    stroke-width:1.5;
}

</style>
</head>

<body>

<h1>Integrated Metabolic Network</h1>

<div class="container" id="canvas">

<svg id="connections"></svg>

<div class="energy-box">
<strong>Energy</strong><br><br>
ATP: <span id="atp">0</span><br>
NADH: <span id="nadh">0</span><br>
FADH₂: <span id="fadh2">0</span><br>
NADPH: <span id="nadph">0</span>
</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const svg = document.getElementById("connections");

let energy = {ATP:0,NADH:0,FADH2:0,NADPH:0};
let index = 0;

const glycolysis = [
{m:"<span class='carbon'>[6C]</span> Glucose", e:"Hexokinase", atp:-1},
{m:"G6P ↔", e:"Phosphoglucose isomerase"},
{m:"F6P", e:"PFK-1", atp:-1},
{m:"F1,6BP ↔", e:"Aldolase"},
{m:"G3P", e:"G3P dehydrogenase", nadh:2},
{m:"1,3-BPG", e:"Phosphoglycerate kinase", atp:2},
{m:"PEP", e:"Pyruvate kinase", atp:2},
{m:"<span class='carbon'>[3C]</span> Pyruvate"}
];

function createNode(text, enzyme, x, y){

let div = document.createElement("div");
div.className="node";
div.style.left=x+"px";
div.style.top=y+"px";

div.innerHTML = `
<div class="title">${text}</div>
<div class="enzyme">${enzyme||""}</div>
`;

canvas.appendChild(div);

setTimeout(()=>div.classList.add("show"),100);

return div;
}

function connect(a,b){
let line = document.createElementNS("http://www.w3.org/2000/svg","line");

let rect1 = a.getBoundingClientRect();
let rect2 = b.getBoundingClientRect();
let parentRect = canvas.getBoundingClientRect();

line.setAttribute("x1", rect1.left - parentRect.left + rect1.width/2);
line.setAttribute("y1", rect1.top - parentRect.top + rect1.height);
line.setAttribute("x2", rect2.left - parentRect.left + rect2.width/2);
line.setAttribute("y2", rect2.top - parentRect.top);

svg.appendChild(line);
}

function updateEnergy(){
atp.textContent = energy.ATP;
nadh.textContent = energy.NADH;
fadh2.textContent = energy.FADH2;
nadph.textContent = energy.NADPH;
}

let previousNode = null;

document.addEventListener("keydown",function(e){

if(e.key==="Enter" && index<glycolysis.length){

let y = 80 + index*90;
let node = createNode(glycolysis[index].m, glycolysis[index].e, 400, y);

if(previousNode){
setTimeout(()=>connect(previousNode,node),200);
}

if(glycolysis[index].atp) energy.ATP += glycolysis[index].atp;
if(glycolysis[index].nadh) energy.NADH += glycolysis[index].nadh;

updateEnergy();

previousNode = node;
index++;

if(index===glycolysis.length){
showBranches(node);
}

}

});

function showBranches(pyruvateNode){

let tca = createNode("TCA Cycle", "", 150, 650);
let lactate = createNode("Lactate", "Lactate dehydrogenase", 650, 650);

setTimeout(()=>{
connect(pyruvateNode,tca);
connect(pyruvateNode,lactate);
},200);

}

</script>

</body>
</html>
