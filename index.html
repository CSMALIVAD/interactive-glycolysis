<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fate of Glucose – Complete Exam Engine</title>

<style>
body{
    font-family:"Segoe UI",Arial;
    background:#ffffff;
    margin:40px;
}

h1{text-align:center;margin-bottom:25px;}

.main{
    width:850px;
    margin:auto;
}

.step{
    margin:14px 0;
    opacity:0;
    transition:opacity 0.25s ease;
}

.step.show{opacity:1;}

.arrow{text-align:center;font-size:18px;}

.branch{
    margin-left:60px;
    border-left:3px solid #999;
    padding-left:15px;
}

.carbon{color:#0077cc;font-weight:bold;}
.green{color:green;}
.red{color:#cc0000;}
.purple{color:#800080;}

.irrev{border-left:6px solid black;padding-left:10px;}
.rev{border-left:6px solid #aaa;padding-left:10px;}

.energy{
position:fixed;
right:40px;
top:120px;
border:1px solid #000;
padding:15px;
width:260px;
background:#fafafa;
}

.rapid .arrow,
.rapid .energy{
display:none;
}

@media print{
.energy{display:none;}
}
</style>
</head>
<body>

<h1>Fate of Glucose – Integrated Metabolic Pathway</h1>

<div class="main" id="main"></div>

<div class="energy">
<b>Live Metabolic Tracker</b><br><br>
Carbon Pool: <span id="CARBON">6</span>C<br><br>
ATP: <span id="ATP">0</span><br>
NADH: <span id="NADH">0</span><br>
FADH2: <span id="FADH2">0</span><br>
NADPH: <span id="NADPH">0</span><br><br>
<b>Total ATP (Aerobic):</b><br>
<span id="TOTAL">0</span>
</div>

<script>

const main=document.getElementById("main");

let energy={ATP:0,NADH:0,FADH2:0,NADPH:0};
let carbon=6;
let history=[];
let mode="root";
let index=0;

function scrollDown(){
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

function update(){
document.getElementById("ATP").textContent=energy.ATP;
document.getElementById("NADH").textContent=energy.NADH;
document.getElementById("FADH2").textContent=energy.FADH2;
document.getElementById("NADPH").textContent=energy.NADPH;
document.getElementById("CARBON").textContent=carbon;

let total = energy.ATP + energy.NADH*2.5 + energy.FADH2*1.5;
document.getElementById("TOTAL").textContent=total.toFixed(1);
}

function add(html,change={},rev=true,isBranch=false,carbonChange=0){

let div=document.createElement("div");
div.className="step "+(rev?"rev":"irrev");
if(isBranch) div.classList.add("branch");

div.innerHTML=html+`<div class="arrow">↓</div>`;
main.appendChild(div);
setTimeout(()=>div.classList.add("show"),30);

history.push({div,change,carbonChange});

for(let k in change) energy[k]+=change[k];
carbon+=carbonChange;

update();
scrollDown();
}

function undo(){
if(history.length===0)return;
let last=history.pop();
main.removeChild(last.div);
for(let k in last.change) energy[k]-=last.change[k];
carbon-=last.carbonChange;
update();
}

function resetAll(){
while(history.length>0) undo();
mode="root";
index=0;
carbon=6;
update();
}

/* ================= PATHWAYS ================= */

const glycolysis=[
{h:"<b>Glycolysis</b>"},
{h:"<span class='carbon'>[6C]</span> Glucose → G6P <span class='red'>-1 ATP</span>",c:{ATP:-1},rev:false},
{h:"F6P → F1,6BP <span class='red'>-1 ATP</span>",c:{ATP:-1},rev:false},
{h:"F1,6BP → 2 × <span class='carbon'>[3C]</span>",carbonChange:-3},
{h:"2 G3P → 1,3-BPG <span class='green'>+2 NADH</span>",c:{NADH:2}},
{h:"1,3-BPG → 3PG <span class='green'>+2 ATP</span>",c:{ATP:2}},
{h:"PEP → 2 Pyruvate <span class='green'>+2 ATP</span>",c:{ATP:2},rev:false}
];

const TCA=[
{h:"<b>TCA Cycle (2 turns)</b>"},
{h:"2 Acetyl-CoA entry <span class='green'>+2 NADH</span>",c:{NADH:2},rev:false},
{h:"Isocitrate DH ×2 <span class='green'>+2 NADH</span>",c:{NADH:2},rev:false},
{h:"α-KG DH ×2 <span class='green'>+2 NADH</span>",c:{NADH:2},rev:false},
{h:"Succinyl-CoA synthetase ×2 <span class='green'>+2 ATP</span>",c:{ATP:2}},
{h:"Succinate DH ×2 <span class='green'>+2 FADH2</span>",c:{FADH2:2}},
{h:"Malate DH ×2 <span class='green'>+2 NADH</span>",c:{NADH:2}}
];

const ETC=[
{h:"<b>Electron Transport Chain</b>"},
{h:"10 NADH × 2.5 ATP"},
{h:"2 FADH2 × 1.5 ATP"},
{h:"≈ <span class='green'>+28 ATP</span>",c:{ATP:28}}
];

const PPP=[
{h:"<b>Pentose Phosphate Pathway</b>"},
{h:"G6P → 6PG (G6PD) <span class='purple'>+2 NADPH</span>",c:{NADPH:2},rev:false},
{h:"Ribose-5-P formation"},
{h:"Transketolase / Transaldolase"}
];

const glycogenesis=[
{h:"<b>Glycogenesis</b>"},
{h:"G6P ↔ G1P"},
{h:"UDP-Glucose formation"},
{h:"Glycogen synthase"},
{h:"Branching enzyme"}
];

const glycogenolysis=[
{h:"<b>Glycogenolysis</b>"},
{h:"Glycogen phosphorylase"},
{h:"Debranching enzyme"},
{h:"G6P release"}
];

/* ================= KEYBOARD ================= */

document.addEventListener("keydown",function(e){

if(e.key==="Enter" && mode==="root"){
add("<span class='carbon'>[6C]</span> Glucose – Central Metabolic Substrate<br><br><b>G: Glycolysis | T: TCA | E: ETC | P: PPP | S: Glycogenesis | O: Glycogenolysis | R: Reset | U: Undo | X: Rapid Mode</b>");
mode="menu";
}

if(e.key==="g"||e.key==="G"){mode="gly";index=0;}
if(e.key==="t"||e.key==="T"){mode="tca";index=0;}
if(e.key==="e"||e.key==="E"){mode="etc";index=0;}
if(e.key==="p"||e.key==="P"){mode="ppp";index=0;}
if(e.key==="s"||e.key==="S"){mode="glycogen";index=0;}
if(e.key==="o"||e.key==="O"){mode="glycogenolysis";index=0;}

if(e.key==="u"||e.key==="U") undo();
if(e.key==="r"||e.key==="R") resetAll();

if(e.key==="x"||e.key==="X"){
document.body.classList.toggle("rapid");
}

if(e.key==="Enter"){

let current;

if(mode==="gly") current=glycolysis;
if(mode==="tca") current=TCA;
if(mode==="etc") current=ETC;
if(mode==="ppp") current=PPP;
if(mode==="glycogen") current=glycogenesis;
if(mode==="glycogenolysis") current=glycogenolysis;

if(current && index<current.length){
let step=current[index];
add(step.h,step.c||{},step.rev!==false,true,step.carbonChange||0);
index++;
}

}

});

update();

</script>
</body>
</html>
