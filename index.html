<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metabolic Atlas Explorer</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
    overflow:hidden;
}

#toolbar{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1000;
}

button{
    padding:6px 10px;
    margin:4px;
    border:1px solid #000;
    background:#fff;
    cursor:pointer;
}

#canvas{
    width:100vw;
    height:100vh;
    overflow:auto;
    transform-origin:0 0;
}

.map{
    position:relative;
    width:2000px;
    height:1400px;
}

.node{
    position:absolute;
    border:1px solid #aaa;
    padding:10px;
    border-radius:6px;
    background:#fff;
    min-width:180px;
    text-align:center;
}

.carbon{color:#0066cc;font-weight:bold;}
.green{color:green;}
.red{color:red;}

.arrow{
    position:absolute;
    width:2px;
    background:#000;
}

.arrow:after{
    content:"";
    position:absolute;
    bottom:0;
    left:-4px;
    border-width:6px 4px 0 4px;
    border-style:solid;
    border-color:#000 transparent transparent transparent;
}

.branch-btn{
    margin-top:5px;
    font-size:12px;
}

</style>
</head>
<body>

<div id="toolbar">
<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>
<button onclick="resetZoom()">Reset Zoom</button>
<button onclick="buildAtlas()">Build Atlas</button>
</div>

<div id="canvas">
<div class="map" id="map"></div>
</div>

<script>

let scale=1;
const map=document.getElementById("map");

/* ========================
   UTILITY FUNCTIONS
========================= */

function createNode(x,y,html,id){
    let div=document.createElement("div");
    div.className="node";
    div.style.left=x+"px";
    div.style.top=y+"px";
    if(id) div.id=id;
    div.innerHTML=html;
    map.appendChild(div);
    return div;
}

function connect(from,to){
    let f=document.getElementById(from);
    let t=document.getElementById(to);
    if(!f||!t) return;

    let fx=f.offsetLeft+f.offsetWidth/2;
    let fy=f.offsetTop+f.offsetHeight;
    let tx=t.offsetLeft+t.offsetWidth/2;
    let ty=t.offsetTop;

    let arrow=document.createElement("div");
    arrow.className="arrow";
    arrow.style.left=fx+"px";
    arrow.style.top=fy+"px";
    arrow.style.height=(ty-fy)+"px";
    map.appendChild(arrow);
}

/* ========================
   BUILD CORE PATHWAY
========================= */

function buildAtlas(){

map.innerHTML="";

/* Glycolysis End Node */

createNode(900,200,
`<b>Pyruvate</b><br>
<span class='carbon'>[3C]</span>
<br>
<button class="branch-btn" onclick="branchTCA()">TCA</button>
<button class="branch-btn" onclick="branchLactate()">Lactate</button>
<button class="branch-btn" onclick="branchAlanine()">Alanine</button>
<button class="branch-btn" onclick="branchGNG()">Gluconeogenesis</button>
<button class="branch-btn" onclick="branchFA()">Fatty Acid Synth</button>
<button class="branch-btn" onclick="branchBeta()">β-oxidation</button>
`,"pyruvate");

}

/* ========================
   BRANCH FUNCTIONS
========================= */

function branchTCA(){

createNode(900,350,
`<b>Acetyl-CoA</b><br>
<span class='carbon'>[2C]</span>`,"acetyl");

connect("pyruvate","acetyl");

/* TCA CYCLE */

let tcaSteps=[
"Citrate [6C]",
"Isocitrate [6C]",
"α-KG [5C] + CO₂",
"Succinyl-CoA [4C]",
"Succinate",
"Fumarate",
"Malate",
"OAA [4C]"
];

let y=450;
tcaSteps.forEach((s,i)=>{
createNode(900,y,`<b>${s}</b>`,"tca"+i);
if(i===0) connect("acetyl","tca0");
else connect("tca"+(i-1),"tca"+i);
y+=100;
});

}

function branchLactate(){
createNode(650,350,
`<b>Lactate</b><br><span class='carbon'>[3C]</span>
<br>Anaerobic<br><span class='green'>NAD+ regenerated</span>`,"lactate");
connect("pyruvate","lactate");
}

function branchAlanine(){
createNode(1150,350,
`<b>Alanine</b><br><span class='carbon'>[3C]</span>
<br>Cahill Cycle`,"alanine");
connect("pyruvate","alanine");
}

function branchGNG(){
createNode(650,600,
`<b>Gluconeogenesis</b><br>
Pyruvate → OAA → PEP → Glucose
<br><span class='red'>ATP used</span>`,"gng");
connect("pyruvate","gng");
}

function branchFA(){
createNode(1150,600,
`<b>Fatty Acid Synthesis</b><br>
Acetyl-CoA → FA
<br><span class='green'>NADPH required</span>`,"fa");
connect("pyruvate","fa");
}

/* ========================
   FULL β-OXIDATION SPIRAL
========================= */

function branchBeta(){

createNode(400,350,
`<b>Fatty Acyl-CoA</b>
<br><span class='carbon'>[16C]</span>`,"beta0");

connect("pyruvate","beta0");

/* Spiral Logic */

let carbons=16;
let y=450;
let step=1;

while(carbons>2){

createNode(400,y,
`<b>β-Oxidation Cycle ${step}</b>
<br><span class='carbon'>[${carbons}C]</span> → <span class='carbon'>[${carbons-2}C]</span>
<br><span class='green'>1 FADH₂ + 1 NADH + 1 Acetyl-CoA</span>`,"beta"+step);

if(step===1) connect("beta0","beta1");
else connect("beta"+(step-1),"beta"+step);

carbons-=2;
y+=120;
step++;
}

}

/* ========================
   ZOOM CONTROLS
========================= */

function zoomIn(){
scale+=0.1;
document.getElementById("canvas").style.transform=`scale(${scale})`;
}
function zoomOut(){
scale-=0.1;
document.getElementById("canvas").style.transform=`scale(${scale})`;
}
function resetZoom(){
scale=1;
document.getElementById("canvas").style.transform="scale(1)";
}

/* INITIAL BUILD */

buildAtlas();

</script>
</body>
</html>
