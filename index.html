<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Integrated Metabolic Network – Professional Presentation</title>

<style>
body{
    font-family: "Segoe UI", Helvetica, Arial;
    background:#ffffff;
    margin:0;
    padding:40px;
}

h1{
    text-align:center;
    font-weight:500;
    margin-bottom:40px;
}

.wrapper{
    display:flex;
    justify-content:center;
}

.canvas{
    position:relative;
    width:900px;
}

.pathway{
    text-align:center;
}

.step{
    margin:22px 0;
    opacity:0;
    transition:opacity 0.4s ease;
}

.step.show{opacity:1;}

.met{
    font-size:17px;
    font-weight:600;
}

.enzyme{
    font-size:13px;
    color:#555;
}

.arrow{
    font-size:22px;
    margin:6px 0;
}

.branch{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

.branch-column{
    width:42%;
    border-top:2px solid #000;
    padding-top:15px;
}

.branch-title{
    text-align:center;
    font-weight:600;
    margin-bottom:10px;
}

.energy{
    position:absolute;
    right:-260px;
    top:0;
    border:1px solid #000;
    padding:15px;
    font-size:14px;
}

.carbon{color:#0b63c7;}
.green{color:#008000;}
.red{color:#b00000;}
.purple{color:#6a0dad;}

.irrev{border-left:4px solid #000;padding-left:8px;}
.rev{border-left:4px solid #aaa;padding-left:8px;}
</style>
</head>

<body>

<h1>Integrated Metabolic Network</h1>

<div class="wrapper">
<div class="canvas">

<div class="pathway" id="main"></div>

<div class="energy">
<strong>Energy Summary</strong><br><br>
ATP: <span id="atp">0</span><br>
NADH: <span id="nadh">0</span><br>
FADH₂: <span id="fadh2">0</span><br>
NADPH: <span id="nadph">0</span>
</div>

<div id="branches"></div>

</div>
</div>

<script>

const main = document.getElementById("main");
const branches = document.getElementById("branches");

let energy = {ATP:0,NADH:0,FADH2:0,NADPH:0};
let index = 0;

const glycolysis = [
{m:"<span class='carbon'>[6C]</span> Glucose", e:"Hexokinase", atp:-1, irr:true},
{m:"G6P ↔", e:"Phosphoglucose isomerase"},
{m:"F6P", e:"PFK-1", atp:-1, irr:true},
{m:"F1,6BP ↔", e:"Aldolase"},
{m:"DHAP ↔ G3P", e:"Triose phosphate isomerase"},
{m:"G3P", e:"G3P dehydrogenase", nadh:2},
{m:"1,3-BPG", e:"Phosphoglycerate kinase", atp:2},
{m:"3-PG ↔", e:"Phosphoglycerate mutase"},
{m:"2-PG ↔", e:"Enolase"},
{m:"PEP", e:"Pyruvate kinase", atp:2, irr:true},
{m:"<span class='carbon'>[3C]</span> Pyruvate", branch:true}
];

function updateEnergy(){
atp.textContent = energy.ATP;
nadh.textContent = energy.NADH;
fadh2.textContent = energy.FADH2;
nadph.textContent = energy.NADPH;
}

function addStep(step){

let div = document.createElement("div");
div.className="step "+(step.irr?"irrev":"rev");

let energyText="";

if(step.atp){energy.ATP+=step.atp;}
if(step.nadh){energy.NADH+=step.nadh;}

if(step.atp)
energyText += `<span class='${step.atp>0?"green":"red"}'>
${step.atp>0?"+":""}${step.atp} ATP</span>`;

if(step.nadh)
energyText += ` <span class='green'>+${step.nadh} NADH</span>`;

div.innerHTML=`
<div class="met">${step.m}</div>
<div class="enzyme">${step.e||""}</div>
<div>${energyText}</div>
<div class="arrow">↓</div>
`;

main.appendChild(div);
setTimeout(()=>div.classList.add("show"),50);
updateEnergy();

if(step.branch) showBranches();
}

function showBranches(){

branches.innerHTML = `
<div class="branch">

<div class="branch-column">
<div class="branch-title">TCA Cycle</div>
Acetyl-CoA → Citrate → Isocitrate → α-KG → Succinyl-CoA → Succinate → Fumarate → Malate
</div>

<div class="branch-column">
<div class="branch-title">Alternative Fates</div>
Pyruvate → Lactate (LDH)<br><br>
Pyruvate → Alanine (ALT)<br><br>
Pyruvate → OAA → Gluconeogenesis<br><br>
NADH → ETC → ATP Synthase
</div>

</div>
`;
}

document.addEventListener("keydown",function(e){
if(e.key==="Enter" && index<glycolysis.length){
addStep(glycolysis[index]);
index++;
}
});

</script>

</body>
</html>
