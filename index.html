<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metabolic Pathway Explorer</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#pathway{
    max-width:800px;
    margin:0 auto;
}

.card{
    border:1px solid #ccc;
    border-radius:6px;
    padding:15px;
    margin:12px 0;
    opacity:0;
    transform:translateY(15px);
    transition:all 0.4s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.irreversible{
    border-left:5px solid #000;
}

.carbon{color:#0066cc;font-weight:bold;}
.green{color:green;}
.red{color:red;}

.integration{
    background:#f9f9f9;
    border:1px dashed #aaa;
    padding:10px;
    margin-top:10px;
    font-size:14px;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:6px 10px;
    margin:5px;
}
</style>
</head>

<body>

<h1>Metabolic Pathway Explorer</h1>

<div class="controls">
<button onclick="resetAll()">Reset (R)</button>
<button onclick="undo()">Undo (←)</button>
</div>

<div id="pathway"></div>

<script>

let pathway=document.getElementById("pathway");
let index=0;
let mode="glycolysis";

/* ================== DATA ================== */

const glycolysis=[
{r:"<span class='carbon'>[6C]</span> Glucose → <span class='carbon'>[6C]</span> G6P",
e:"Hexokinase",
en:"<span class='red'>ATP consumed</span>",
ir:true,
int:"Press P for Pentose Phosphate Pathway"},

{r:"<span class='carbon'>[6C]</span> G6P ↔ <span class='carbon'>[6C]</span> F6P",
e:"Isomerase",
en:"",
ir:false},

{r:"<span class='carbon'>[6C]</span> F6P → <span class='carbon'>[6C]</span> F1,6BP",
e:"PFK-1",
en:"<span class='red'>ATP consumed</span>",
ir:true},

{r:"<span class='carbon'>[6C]</span> F1,6BP ↔ <span class='carbon'>[3C]</span> + <span class='carbon'>[3C]</span>",
e:"Aldolase",
en:"",
ir:false},

{r:"<span class='carbon'>[3C]</span> PEP → <span class='carbon'>[3C]</span> Pyruvate",
e:"Pyruvate kinase",
en:"<span class='green'>ATP produced</span>",
ir:true,
int:"Press T (TCA), G (Gluconeogenesis), L (Lactate), A (Alanine), B (Beta-oxidation)"}
];

const tca=[
"Acetyl-CoA + OAA → Citrate",
"Citrate ↔ Isocitrate",
"Isocitrate → α-KG + CO₂",
"α-KG → Succinyl-CoA + CO₂",
"Succinyl-CoA → Succinate",
"Succinate → Fumarate",
"Fumarate → Malate",
"Malate → OAA"
];

/* ================== FUNCTIONS ================== */

function createCard(content,enzyme="",energy="",irreversible=false,integrate=""){
let div=document.createElement("div");
div.className="card";
if(irreversible) div.classList.add("irreversible");

div.innerHTML=`
${content}<br>
Enzyme: ${enzyme}<br>
${energy}
`;

if(integrate){
let box=document.createElement("div");
box.className="integration";
box.innerHTML=integrate;
div.appendChild(box);
}

setTimeout(()=>div.classList.add("show"),50);
return div;
}

function next(){
if(mode==="glycolysis" && index<glycolysis.length){
let step=glycolysis[index];
pathway.appendChild(createCard(step.r,step.e,step.en,step.ir,step.int));
index++;
}
}

function undo(){
if(index>0){
pathway.removeChild(pathway.lastChild);
index--;
}
}

function resetAll(){
pathway.innerHTML="";
index=0;
mode="glycolysis";
}

/* ========== INTEGRATION KEYS ========== */

function buildTCA(){
mode="tca";
tca.forEach(step=>{
pathway.appendChild(createCard(step,"","",false,""));
});
}

function buildPPP(){
pathway.appendChild(createCard(
"G6P → 6PG → Ribulose-5P + CO₂",
"G6PD",
"<span class='green'>NADPH produced</span>",
true,""
));
}

function buildBeta(){
let carbons=16;
while(carbons>2){
pathway.appendChild(createCard(
`Fatty Acyl-CoA <span class='carbon'>[${carbons}C]</span> → <span class='carbon'>[${carbons-2}C]</span>`,
"",
"<span class='green'>1 NADH + 1 FADH₂ + 1 Acetyl-CoA</span>",
false,""
));
carbons-=2;
}
}

/* ========== KEYBOARD ========== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter") next();
if(e.key==="ArrowLeft") undo();
if(e.key==="Backspace"){e.preventDefault(); undo();}
if(e.key==="r"||e.key==="R") resetAll();

if(e.key==="T"||e.key==="t") buildTCA();
if(e.key==="P"||e.key==="p") buildPPP();
if(e.key==="B"||e.key==="b") buildBeta();

});

</script>

</body>
</html>
