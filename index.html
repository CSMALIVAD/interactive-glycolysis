<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metabolic Pathway – Exam Mode</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#222;
}

#pathway{
    max-width:700px;
    margin:0 auto;
    position:relative;
}

.step{
    text-align:center;
    margin:25px 0;
    opacity:0;
    transition:opacity 0.4s ease;
}

.step.show{
    opacity:1;
}

.metabolite{
    font-size:20px;
    font-weight:bold;
}

.enzyme{
    font-size:15px;
    color:#555;
}

.carbon{
    color:#0077cc;
    font-weight:bold;
}

.green{color:green;}
.red{color:red;}

.arrow{
    font-size:30px;
    color:#444;
    margin:10px 0;
}

.side-branch{
    position:absolute;
    left:750px;
    width:350px;
    border-left:3px solid #999;
    padding-left:15px;
    top:0;
}

.branch-step{
    margin:20px 0;
    font-size:14px;
    color:#333;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:6px 12px;
    margin:5px;
}
</style>
</head>

<body>

<h1>Metabolic Pathway – Exam Preparation Mode</h1>

<div class="controls">
<button onclick="resetAll()">Reset (R)</button>
</div>

<div id="pathway"></div>

<script>

let index=0;
let pathway=document.getElementById("pathway");

/* ================= GLYCOLYSIS ================= */

const glycolysis=[
{
met:"<span class='carbon'>[6C]</span> Glucose",
enz:"Hexokinase",
energy:"<span class='red'>ATP used</span>"
},
{
met:"<span class='carbon'>[6C]</span> Glucose-6-phosphate",
enz:"Phosphoglucose isomerase",
energy:""
},
{
met:"<span class='carbon'>[6C]</span> Fructose-6-phosphate",
enz:"PFK-1",
energy:"<span class='red'>ATP used</span>"
},
{
met:"<span class='carbon'>[6C]</span> Fructose-1,6-bisphosphate",
enz:"Aldolase",
energy:""
},
{
met:"<span class='carbon'>[3C]</span> PEP",
enz:"Pyruvate kinase",
energy:"<span class='green'>ATP produced</span>",
integration:true
},
{
met:"<span class='carbon'>[3C]</span> Pyruvate",
enz:"Central metabolic junction",
energy:""
}
];

/* ============= FUNCTIONS ============= */

function addStep(step){

let div=document.createElement("div");
div.className="step";

div.innerHTML=`
<div class="metabolite">${step.met}</div>
<div class="enzyme">Enzyme: ${step.enz}</div>
<div>${step.energy}</div>
<div class="arrow">↓</div>
`;

pathway.appendChild(div);
setTimeout(()=>div.classList.add("show"),50);

if(step.integration){
showIntegrationHint();
}

}

function nextStep(){
if(index<glycolysis.length){
addStep(glycolysis[index]);
index++;
}
}

function resetAll(){
pathway.innerHTML="";
index=0;
removeSideBranch();
}

/* ============ INTEGRATION ============ */

function showIntegrationHint(){

let hint=document.createElement("div");
hint.className="step show";
hint.innerHTML=`
<div style="color:#aa0000;font-weight:bold;">
Integration Available:
Press T (TCA) | P (PPP) | G (Gluconeogenesis)
</div>
`;
pathway.appendChild(hint);

}

function removeSideBranch(){
let old=document.querySelector(".side-branch");
if(old) old.remove();
}

function buildTCA(){

removeSideBranch();

let branch=document.createElement("div");
branch.className="side-branch";
branch.innerHTML=`
<h3 style="color:#444;">TCA Cycle</h3>
<div class="branch-step">Acetyl-CoA + OAA → Citrate</div>
<div class="branch-step">Citrate → Isocitrate</div>
<div class="branch-step">Isocitrate → α-KG <span class='green'>NADH</span></div>
<div class="branch-step">α-KG → Succinyl-CoA <span class='green'>NADH</span></div>
<div class="branch-step">Succinate → Fumarate <span class='green'>FADH₂</span></div>
<div class="branch-step">Malate → OAA <span class='green'>NADH</span></div>
`;
document.body.appendChild(branch);
}

function buildPPP(){
removeSideBranch();
let branch=document.createElement("div");
branch.className="side-branch";
branch.innerHTML=`
<h3 style="color:#444;">Pentose Phosphate Pathway</h3>
<div class="branch-step">G6P → 6PG</div>
<div class="branch-step"><span class='green'>NADPH produced</span></div>
<div class="branch-step">Ribulose-5P</div>
`;
document.body.appendChild(branch);
}

/* ============ KEYBOARD ============ */

document.addEventListener("keydown",function(e){

if(e.key==="Enter") nextStep();
if(e.key==="r"||e.key==="R") resetAll();
if(e.key==="T"||e.key==="t") buildTCA();
if(e.key==="P"||e.key==="p") buildPPP();

});

</script>

</body>
</html>
