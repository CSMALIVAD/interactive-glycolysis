<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Glycolysis</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 700px;
    text-align: center;
}

.card {
    border: 1px solid #ccc;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    margin-bottom: 20px;
}

h2 {
    margin-top: 0;
}

.carbon {
    font-weight: bold;
    font-size: 18px;
}

.energy {
    margin-top: 10px;
    font-style: italic;
    color: #555;
}

button {
    margin-top: 20px;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    background: #000;
    color: #fff;
    cursor: pointer;
}

.footer {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Interactive Glycolysis</h1>
    <div id="card" class="card"></div>
    <button onclick="resetSteps()">Reset</button>
    <div class="footer">Press ENTER to move to next step</div>
</div>

<script>
const steps = [
{
title: "Step 1",
content: "<div class='carbon'>[6C] Glucose → [6C] Glucose-6-phosphate</div><br>Enzyme: Hexokinase<br><div class='energy'>ATP consumed</div>"
},
{
title: "Step 2",
content: "<div class='carbon'>[6C] Glucose-6-phosphate → [6C] Fructose-6-phosphate</div><br>Enzyme: Phosphoglucose isomerase</div>"
},
{
title: "Step 3",
content: "<div class='carbon'>[6C] Fructose-6-phosphate → [6C] Fructose-1,6-bisphosphate</div><br>Enzyme: Phosphofructokinase-1<br><div class='energy'>ATP consumed</div>"
},
{
title: "Step 4",
content: "<div class='carbon'>[6C] Fructose-1,6-bisphosphate → [3C] DHAP + [3C] G3P</div><br>Enzyme: Aldolase</div>"
},
{
title: "Step 5",
content: "<div class='carbon'>[3C] DHAP → [3C] G3P</div><br>Enzyme: Triose phosphate isomerase</div>"
},
{
title: "Step 6",
content: "<div class='carbon'>[3C] G3P → [3C] 1,3-Bisphosphoglycerate</div><br>Enzyme: Glyceraldehyde-3-phosphate dehydrogenase<br><div class='energy'>2 NADH produced</div>"
},
{
title: "Step 7",
content: "<div class='carbon'>[3C] 1,3-Bisphosphoglycerate → [3C] 3-Phosphoglycerate</div><br>Enzyme: Phosphoglycerate kinase<br><div class='energy'>2 ATP produced</div>"
},
{
title: "Step 8",
content: "<div class='carbon'>[3C] 3-Phosphoglycerate → [3C] 2-Phosphoglycerate</div><br>Enzyme: Phosphoglycerate mutase</div>"
},
{
title: "Step 9",
content: "<div class='carbon'>[3C] 2-Phosphoglycerate → [3C] Phosphoenolpyruvate</div><br>Enzyme: Enolase</div>"
},
{
title: "Step 10",
content: "<div class='carbon'>[3C] Phosphoenolpyruvate → [3C] Pyruvate</div><br>Enzyme: Pyruvate kinase<br><div class='energy'>2 ATP produced</div>"
},
{
title: "Final Output",
content: "<div class='carbon'>Net yield: 2 ATP + 2 NADH + 2 Pyruvate (3C each)</div>"
}
];

let currentStep = 0;
const card = document.getElementById("card");

function showStep() {
    if (currentStep < steps.length) {
        card.classList.remove("show");
        setTimeout(() => {
            card.innerHTML = "<h2>" + steps[currentStep].title + "</h2>" + steps[currentStep].content;
            card.classList.add("show");
            currentStep++;
        }, 200);
    }
}

function resetSteps() {
    currentStep = 0;
    card.innerHTML = "";
    card.classList.remove("show");
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        showStep();
    }
});
</script>

</body>
</html>
