<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fate of Glucose – Integrated Metabolic Pathway</title>

<style>
body{
    font-family: "Segoe UI", Arial;
    background:#ffffff;
    margin:40px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.container{
    display:flex;
    justify-content:center;
}

.main{
    width:700px;
}

.step{
    margin:18px 0;
    opacity:0;
    transition:opacity 0.4s ease;
}

.step.show{opacity:1;}

.arrow{
    text-align:center;
    font-size:22px;
}

.carbon{color:#0077cc;font-weight:bold;}
.green{color:green;}
.red{color:#cc0000;}
.purple{color:#800080;}

.irrev{border-left:5px solid black;padding-left:10px;}
.rev{border-left:5px solid #aaa;padding-left:10px;}

.energy{
    position:fixed;
    right:40px;
    top:120px;
    border:1px solid #000;
    padding:15px;
    width:200px;
}

.option{
    margin:6px 0;
    font-size:14px;
}
</style>
</head>

<body>

<h1>Fate of Glucose – Integrated Metabolic Pathway</h1>

<div class="container">
<div class="main" id="main"></div>
</div>

<div class="energy">
<b>Energy Tracker</b><br><br>
ATP: <span id="atp">0</span><br>
NADH: <span id="nadh">0</span><br>
FADH2: <span id="fadh2">0</span><br>
NADPH: <span id="nadph">0</span>
</div>

<script>

const main = document.getElementById("main");

let energy = {ATP:0,NADH:0,FADH2:0,NADPH:0};
let historyStack = [];
let currentPathway = "absorption";
let index = 0;

function updateEnergy(){
    atp.textContent = energy.ATP;
    nadh.textContent = energy.NADH;
    fadh2.textContent = energy.FADH2;
    nadph.textContent = energy.NADPH;
}

function addStep(html, energyChange={}, reversible=true){

    let div = document.createElement("div");
    div.className = "step " + (reversible?"rev":"irrev");

    div.innerHTML = html + `<div class="arrow">↓</div>`;
    main.appendChild(div);

    setTimeout(()=>div.classList.add("show"),50);

    historyStack.push({div, energyChange});

    for(let key in energyChange){
        energy[key] += energyChange[key];
    }
    updateEnergy();
}

function undo(){
    if(historyStack.length===0) return;
    let last = historyStack.pop();
    main.removeChild(last.div);
    for(let key in last.energyChange){
        energy[key] -= last.energyChange[key];
    }
    updateEnergy();
}

function resetAll(){
    while(historyStack.length>0){
        undo();
    }
    currentPathway="absorption";
    index=0;
}

const absorption = [
"Dietary Carbohydrates",
"Digestion: Amylase → Maltase / Sucrase / Lactase",
"Glucose absorption via SGLT1 (Intestine)",
"Transport via GLUT2 → Portal Circulation",
"Liver uptake via GLUT2",
"Peripheral uptake via GLUT4 (Insulin dependent)"
];

const glycolysis = [
{html:"<span class='carbon'>[6C]</span> Glucose → G6P (Hexokinase) <span class='red'>-1 ATP</span>",energy:{ATP:-1},rev:false},
{html:"G6P ↔ F6P (Phosphoglucose isomerase)"},
{html:"F6P → F1,6BP (PFK-1) <span class='red'>-1 ATP</span>",energy:{ATP:-1},rev:false},
{html:"F1,6BP ↔ DHAP + G3P (Aldolase)"},
{html:"G3P → 1,3-BPG (G3P DH) <span class='green'>+2 NADH</span>",energy:{NADH:2}},
{html:"1,3-BPG → 3PG (PGK) <span class='green'>+2 ATP</span>",energy:{ATP:2}},
{html:"PEP → Pyruvate (Pyruvate kinase) <span class='green'>+2 ATP</span>",energy:{ATP:2},rev:false}
];

const tca = [
{html:"Acetyl-CoA entry (PDH) <span class='green'>+1 NADH</span>",energy:{NADH:1},rev:false},
{html:"Citrate synthase"},
{html:"Isocitrate DH <span class='green'>+1 NADH</span>",energy:{NADH:1},rev:false},
{html:"α-KG DH <span class='green'>+1 NADH</span>",energy:{NADH:1},rev:false},
{html:"Succinyl-CoA synthetase <span class='green'>+1 GTP</span>",energy:{ATP:1}},
{html:"Succinate DH <span class='green'>+1 FADH2</span>",energy:{FADH2:1}},
{html:"Malate DH <span class='green'>+1 NADH</span>",energy:{NADH:1}}
];

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(currentPathway==="absorption"){
if(index<absorption.length){
addStep(absorption[index],{},true);
index++;
}else{
addStep("<span class='carbon'>[6C]</span> Glucose – Central Metabolic Substrate<br><br><b>Press G: Glycolysis | P: PPP | S: Glycogenesis | L: Lipogenesis | C: Cori | A: Cahill | N: Gluconeogenesis</b>");
currentPathway="decision";
}
}

else if(currentPathway==="glycolysis"){
if(index<glycolysis.length){
let step=glycolysis[index];
addStep(step.html,step.energy||{},step.rev!==false);
index++;
}else{
addStep("<span class='carbon'>[3C]</span> Pyruvate – Central Junction<br><br><b>Press T: TCA | L: Lactate | A: Alanine | G: Gluconeogenesis</b>");
currentPathway="postgly";
}
}

else if(currentPathway==="tca"){
if(index<tca.length){
let step=tca[index];
addStep(step.html,step.energy||{},step.rev!==false);
index++;
}else{
addStep("NADH + FADH2 → Electron Transport Chain → <span class='green'>~30 ATP</span>",{ATP:30});
addStep("<b>Glucose is the central metabolic currency of cellular life.</b>");
currentPathway="done";
}
}

}

if(e.key==="Backspace") undo();
if(e.key==="r"||e.key==="R") resetAll();

if(e.key==="g"||e.key==="G"){
currentPathway="glycolysis";
index=0;
}

if(e.key==="t"||e.key==="T"){
currentPathway="tca";
index=0;
}

});

</script>

</body>
</html>
